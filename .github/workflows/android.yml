name: Android Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Initialize Gradle Wrapper
        run: gradle wrapper

      # خطوة هامة: تحويل ملف البصمة من base64 إلى ملف حقيقي
      - name: Decode Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Keystore base64 file not found, skipping decode."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # تنفيذ البناء مع تجاهل أخطاء الواجهة الرسومية (AWT) التي ظهرت في الصورة
      - name: Build Debug APK
        run: ./gradlew assembleDebug -Dorg.gradle.daemon=false -Djava.awt.headless=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IconicStudio-APK
          path: app/build/outputs/apk/debug/app-debug.apk
